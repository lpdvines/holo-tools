<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap — HOLO Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .roadmap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .add-btn { background: var(--accent); color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .add-btn:hover { background: var(--accent-hover); }

    .columns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    @media (max-width: 900px) { .columns { grid-template-columns: 1fr; } }

    .column { background: var(--bg-subtle); border-radius: 12px; padding: 16px; min-height: 200px; }
    .column-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .column-count { background: var(--border); border-radius: 10px; padding: 1px 8px; font-size: 11px; font-weight: 600; }

    .task-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: grab; transition: box-shadow 0.15s, transform 0.15s; }
    .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .task-card.dragging { opacity: 0.5; transform: rotate(2deg); }
    .task-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .task-card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
    .task-card-footer { display: flex; justify-content: space-between; align-items: center; }
    .task-priority { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .priority-high { background: #fef2f2; color: #dc2626; }
    .priority-medium { background: #fffbeb; color: #d97706; }
    .priority-low { background: #f0fdf4; color: #16a34a; }
    .task-actions { display: flex; gap: 4px; }
    .task-action-btn { background: none; border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--text-muted); font-family: inherit; }
    .task-action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .task-action-btn.delete:hover { border-color: #dc2626; color: #dc2626; }
    .task-date { font-size: 10px; color: var(--text-muted); margin-top: 6px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.visible { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 28px; width: 90%; max-width: 480px; box-shadow: 0 16px 48px rgba(0,0,0,0.15); }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .modal .form-row { margin-bottom: 14px; }
    .modal .form-row label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    .modal .form-row input, .modal .form-row textarea, .modal .form-row select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; }
    .modal .form-row input:focus, .modal .form-row textarea:focus, .modal .form-row select:focus { border-color: var(--accent); }
    .modal .form-row textarea { resize: vertical; min-height: 70px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions .btn { flex: 1; text-align: center; }
    .btn-secondary { background: var(--bg-subtle); border: 1px solid var(--border); color: var(--text); padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }

    .drop-zone { border: 2px dashed var(--border); border-radius: 8px; min-height: 40px; transition: border-color 0.15s, background 0.15s; }
    .drop-zone.over { border-color: var(--accent); background: #fff0f4; }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">HOLO <span>Digital</span></a>
    <span class="header-tag">Roadmap</span>
  </header>

  <main>
    <div class="roadmap-header">
      <div>
        <h1 class="page-title">Roadmap</h1>
        <p class="page-subtitle">Track tool ideas, features and integrations.</p>
      </div>
      <button class="add-btn" onclick="openModal()">+ Add Idea</button>
    </div>

    <div class="columns">
      <div class="column" id="col-planned" ondrop="drop(event,'planned')" ondragover="dragOver(event)" ondragleave="dragLeave(event)">
        <div class="column-title">Planned <span class="column-count" id="count-planned">0</span></div>
        <div class="drop-zone" id="list-planned"></div>
      </div>
      <div class="column" id="col-in-progress" ondrop="drop(event,'in-progress')" ondragover="dragOver(event)" ondragleave="dragLeave(event)">
        <div class="column-title">In Progress <span class="column-count" id="count-in-progress">0</span></div>
        <div class="drop-zone" id="list-in-progress"></div>
      </div>
      <div class="column" id="col-done" ondrop="drop(event,'done')" ondragover="dragOver(event)" ondragleave="dragLeave(event)">
        <div class="column-title">Done <span class="column-count" id="count-done">0</span></div>
        <div class="drop-zone" id="list-done"></div>
      </div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title" id="modal-title">Add Idea</div>
      <div class="form-row">
        <label for="task-title">Title</label>
        <input type="text" id="task-title" placeholder="e.g. Meta Title Generator">
      </div>
      <div class="form-row">
        <label for="task-desc">Description</label>
        <textarea id="task-desc" placeholder="What it does, why it's useful…"></textarea>
      </div>
      <div class="form-row">
        <label for="task-priority">Priority</label>
        <select id="task-priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="form-row">
        <label for="task-status">Status</label>
        <select id="task-status">
          <option value="planned">Planned</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <input type="hidden" id="task-edit-id">
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTask()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let tasks = [];
    let draggedId = null;

    async function loadTasks() {
      const res = await fetch('/api/roadmap');
      tasks = await res.json();
      render();
    }

    async function saveTasks() {
      await fetch('/api/roadmap', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(tasks),
      });
    }

    function render() {
      ['planned', 'in-progress', 'done'].forEach(status => {
        const list = document.getElementById(`list-${status}`);
        const filtered = tasks.filter(t => t.status === status);

        // Sort: high first, then medium, then low
        const order = { high: 0, medium: 1, low: 2 };
        filtered.sort((a, b) => (order[a.priority] || 1) - (order[b.priority] || 1));

        list.innerHTML = filtered.map(t => `
          <div class="task-card" draggable="true" ondragstart="dragStart(event,'${t.id}')" ondragend="dragEnd(event)" id="card-${t.id}">
            <div class="task-card-title">${esc(t.title)}</div>
            ${t.description ? `<div class="task-card-desc">${esc(t.description)}</div>` : ''}
            <div class="task-card-footer">
              <span class="task-priority priority-${t.priority}">${t.priority}</span>
              <div class="task-actions">
                <button class="task-action-btn" onclick="editTask('${t.id}')">Edit</button>
                <button class="task-action-btn delete" onclick="deleteTask('${t.id}')">Delete</button>
              </div>
            </div>
            ${t.createdAt ? `<div class="task-date">Added ${t.createdAt}</div>` : ''}
          </div>
        `).join('');

        document.getElementById(`count-${status}`).textContent = filtered.length;
      });
    }

    function openModal(taskId) {
      const modal = document.getElementById('modal-overlay');
      if (taskId) {
        const t = tasks.find(x => x.id === taskId);
        document.getElementById('modal-title').textContent = 'Edit Idea';
        document.getElementById('task-title').value = t.title;
        document.getElementById('task-desc').value = t.description || '';
        document.getElementById('task-priority').value = t.priority;
        document.getElementById('task-status').value = t.status;
        document.getElementById('task-edit-id').value = t.id;
      } else {
        document.getElementById('modal-title').textContent = 'Add Idea';
        document.getElementById('task-title').value = '';
        document.getElementById('task-desc').value = '';
        document.getElementById('task-priority').value = 'medium';
        document.getElementById('task-status').value = 'planned';
        document.getElementById('task-edit-id').value = '';
      }
      modal.classList.add('visible');
      document.getElementById('task-title').focus();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('visible');
    }

    async function saveTask() {
      const title = document.getElementById('task-title').value.trim();
      const description = document.getElementById('task-desc').value.trim();
      const priority = document.getElementById('task-priority').value;
      const status = document.getElementById('task-status').value;
      const editId = document.getElementById('task-edit-id').value;

      if (!title) return;

      if (editId) {
        const t = tasks.find(x => x.id === editId);
        t.title = title;
        t.description = description;
        t.priority = priority;
        t.status = status;
      } else {
        tasks.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          title,
          description,
          priority,
          status,
          createdAt: new Date().toISOString().slice(0, 10),
        });
      }

      await saveTasks();
      render();
      closeModal();
    }

    function editTask(id) {
      openModal(id);
    }

    async function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      await saveTasks();
      render();
    }

    // Drag and drop
    function dragStart(e, id) {
      draggedId = id;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function dragEnd(e) {
      e.target.classList.remove('dragging');
      draggedId = null;
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('over'));
    }

    function dragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const zone = e.currentTarget.querySelector('.drop-zone');
      if (zone) zone.classList.add('over');
    }

    function dragLeave(e) {
      const zone = e.currentTarget.querySelector('.drop-zone');
      if (zone) zone.classList.remove('over');
    }

    async function drop(e, newStatus) {
      e.preventDefault();
      const zone = e.currentTarget.querySelector('.drop-zone');
      if (zone) zone.classList.remove('over');

      if (!draggedId) return;
      const t = tasks.find(x => x.id === draggedId);
      if (t) {
        t.status = newStatus;
        await saveTasks();
        render();
      }
    }

    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    loadTasks();
  </script>
</body>
</html>
